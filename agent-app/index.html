<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickCut Agent - Onboarding Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a73e8; --secondary: #34a853; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 480px; background: white; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; position: relative; }
        .content { padding: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; border: none; }
        .btn-main { background: var(--primary); color: white; }
        .btn-add { background: var(--secondary); color: white; width: auto; padding: 8px 15px; }
        .logout-btn { position: absolute; right: 10px; top: 15px; background: rgba(255,255,255,0.2); font-size: 11px; width: auto; padding: 5px 8px; border-radius: 5px; }
        .service-item { background: #fdfdfd; border: 1px solid #eee; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
        .row { display: flex; gap: 8px; align-items: center; }
        label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-top: 10px; }
        .qr-card { text-align: center; border: 2px dashed var(--primary); padding: 15px; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-sec" class="content">
        <h2 style="text-align:center; color:var(--primary);">Agent Login</h2>
        <input type="text" id="agentID" placeholder="Agent User ID (Mobile)">
        <input type="password" id="agentPass" placeholder="Password">
        <button class="btn-main" onclick="handleLogin()">Login</button>
        <p style="text-align:center; font-size:13px; color:blue; cursor:pointer;" onclick="alert('Contact Admin for Password Reset')">Forget Password?</p>
    </div>

    <div id="app-sec" style="display:none;">
        <div class="header">
            <h3>Salon Onboarding</h3>
            <button class="logout-btn" onclick="location.reload()">Logout</button>
        </div>
        
        <div class="content">
            <label>Owner Details</label>
            <input type="text" id="oName" placeholder="Owner Full Name">
            <input type="number" id="oPhone" placeholder="Mobile Number">
            
            <label>Salon Type</label>
            <select id="sType">
                <option value="Non-AC">Non-AC Salon</option>
                <option value="AC">AC Salon</option>
                <option value="Luxury">Luxury Salon</option>
                <option value="Beauty Parlour">Beauty Parlour</option>
            </select>

            <label>Documents (Upload)</label>
            <div style="font-size:11px;">Govt ID Photo:</div>
            <input type="file" id="govtFile" accept="image/*">
            <div style="font-size:11px;">Salon Photo:</div>
            <input type="file" id="salonImg" accept="image/*">

            <input type="text" id="loc" placeholder="Location Link / Address">

            <hr style="opacity:0.2; margin:20px 0;">
            <h3 style="font-size:16px;">Services Management</h3>
            <div id="services-list">
                <div class="service-item">
                    <input type="checkbox" checked> <strong>Haircut</strong>
                    <div class="row"><input type="number" placeholder="Price" class="s-price"> <input type="file" class="s-img"></div>
                </div>
                <div class="service-item">
                    <input type="checkbox" checked> <strong>Facial</strong>
                    <div class="row"><input type="number" placeholder="Price" class="s-price"> <input type="file" class="s-img"></div>
                </div>
            </div>
            <button class="btn-add" onclick="addService()">+ Add New Service</button>

            <div class="qr-card">
                <p style="margin:0; font-weight:bold;">💳 Payment QR</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=upi://pay?pa=YOURUPI@okicici" alt="QR">
                <p style="font-size:11px; color:#666;">Scan to pay registration fee</p>
            </div>

            <button class="btn-main" style="background:var(--secondary); margin-top:20px; font-size:17px;" onclick="saveData()">✅ Onboarding Complete</button>
        </div>
    </div>
</div>

<script>
    // Your Keys
    const URL = 'https://mzwmltyonvjzjlojsgds.supabase.co';
    const KEY = 'sb_publishable_ooFUtwlgBSKmIgzNPa_FTA_UQ_7s25o';
    const _supabase = supabase.createClient(URL, KEY);

    async function handleLogin() {
        const id = document.getElementById('agentID').value;
        const ps = document.getElementById('agentPass').value;
        const { error } = await _supabase.auth.signInWithPassword({ email: id + "@salon.com", password: ps });
        if (error) alert("Login Failed! Check ID/Pass.");
        else {
            document.getElementById('login-sec').style.display = 'none';
            document.getElementById('app-sec').style.display = 'block';
        }
    }

    function addService() {
        const div = document.createElement('div');
        div.className = 'service-item';
        div.innerHTML = `<input type="text" placeholder="Service Name" class="s-name-extra"> <div class="row"><input type="number" placeholder="Price" class="s-price"> <input type="file" class="s-img"></div>`;
        document.getElementById('services-list').appendChild(div);
    }

    async function saveData() {
        alert("Saving data and uploading images to 'salon-assets'...");
        // Final logic for storage upload goes here
        alert("Registration Successful!");
        location.reload();
    }
</script>
</body>
</html>
